logbook.strategy=body-only-if-status-at-least
logging.level.lol.maki.dev.todo.TodoApiApplication=debug
logging.level.org.springframework.security=info
management.endpoints.web.exposure.include=info,health,prometheus
management.info.env.enabled=true
management.info.java.enabled=true
management.info.os.enabled=true
management.observations.enable.spring.security=false
management.otlp.metrics.export.enabled=false
management.tracing.sampling.probability=1.0
server.http2.enabled=true
server.port=8081
spring.application.name=todo-api
spring.datasource.url=jdbc:sqlite:/tmp/todo.db
spring.docker.compose.enabled=false
spring.docker.compose.lifecycle-management=start_only
spring.jackson.deserialization.fail-on-null-for-primitives=false
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://authorization.localhost:9000
spring.sql.init.mode=always
spring.web.error.include-message=always
